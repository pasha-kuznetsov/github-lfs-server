name: Main

on:
  workflow_dispatch:

jobs:
  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/init

      - name: Write vars.json
        run: printf '%s\n' "$VARS_JSON" > vars.json
        env:
          VARS_JSON: ${{ vars.VARS_JSON }}

      - run: scripts/run.sh prepare-deployment

      - run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
