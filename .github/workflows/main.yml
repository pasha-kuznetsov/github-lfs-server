name: Main

on:
  pull_request:
  push: { branches: [main] }
  workflow_dispatch: # Can run manually from the Actions tab

permissions: {}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: git-lfs-hub/ci-cd/actions/init-bun@main

      - run: bun run test --coverage

      - id: deployment
        uses: actions/upload-pages-artifact@v5
        with: { path: ./coverage }
